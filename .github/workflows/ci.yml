name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check src tests scripts

      - name: Offline tests
        run: uv run python -m pytest -m "not live" -q

      - name: Generated docs are fresh
        run: |
          uv run python scripts/render_catalog.py --check
          uv run python scripts/render_tools.py --check
          uv run python scripts/render_community_table.py --check
