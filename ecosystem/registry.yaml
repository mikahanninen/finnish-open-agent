# Finnish Open Agent — community registry
# ---------------------------------------------------------------------------
# A curated index of skills, MCP servers, and agentic tools for Finnish
# services. We LINK to each project at its source; we do NOT copy anyone's
# code into this repo. Each author keeps ownership, license, and credit.
#
# To add your project, open a PR that appends an entry below and run:
#   python scripts/render_catalog.py            # regenerates ecosystem/CATALOG.md
#   python scripts/render_community_table.py     # regenerates the site's community table
# See CONTRIBUTING.md for the (short) inclusion criteria.
# ---------------------------------------------------------------------------
version: 1

# Canonical repository URL; first-party entries link here.
self_repo: "https://github.com/mikahanninen/finnish-open-agent"

entries:
  # --- First-party (shipped in this repo) --------------------------------
  - id: finnish-services-mcp
    name: Finnish Services MCP
    kinds: [mcp]
    author: Finnish Open Agent
    first_party: true
    path: src/finnish_open_agent
    license: MIT
    language: Python
    domains: [energy, weather, transport, registers, civic, culture, library, health, events]
    tags: [digitraffic, fmi, prh, statistics-finland, eduskunta, finna, thl, cli]
    description: >-
      Open-source, portable, agent-friendly toolkit exposing Finnish open data
      as 40 tools — usable as a CLI (human), JSON (AI), or MCP server. Covers
      electricity prices, FMI weather/air-quality/sea/radiation, Digitraffic
      road/rail/marine + Digitransit routing, PRH/YTJ, avoindata.fi, Statistics
      Finland & Suomi.fi services, Eduskunta MPs & votes, Finna culture, NLS
      geocoding, libraries, THL health statistics, and events.

  - id: finnish-open-data-skill
    name: Finnish Open Data (CLI skill)
    kinds: [skill]
    author: Finnish Open Agent
    first_party: true
    path: skills/finnish-open-data
    license: MIT
    language: Markdown
    domains: [energy, weather, transport, registers]
    tags: [curl, cli, open-data]
    description: >-
      A copy-pasteable curl/jq playbook for the same Finnish open APIs, for use
      when no MCP server is connected.

  # --- Community entries (external; link-only, full credit to authors) ----
  - id: wilmai
    name: WilmAI
    kinds: [library]
    author: aikarjal
    repo: "https://github.com/aikarjal/wilmai"
    homepage: "https://www.wilm.ai/"
    license: MIT
    language: TypeScript
    domains: [education]
    tags: [wilma, school, cli, agent-friendly, json]
    added: "2026-07-19"
    description: >-
      An independent, open-source CLI that reads Finland's Wilma school system —
      schedules, homework, exams, grades, attendance, messages, and news — as
      consistent JSON across tenants. Ships an interactive parent dashboard plus
      a non-interactive command mode designed for AI-agent integration.
      Unaffiliated with Visma.

  - id: maiklubi
    name: maiklubi
    kinds: [skill, library]
    author: Janne Mäkelä
    repo: "https://github.com/jannemakela/maiklubi"
    homepage: "https://maiklubi.com/"
    license: MIT
    language: TypeScript
    domains: [education]
    tags: [myclub, sports-club, cli, agent-skill, json]
    added: "2026-07-21"
    description: >-
      An AI-friendly CLI for myclub.fi that consolidates family sports-club
      management — events, RSVPs, invoices, and notifications across multiple
      members and clubs — from the terminal or an AI agent. Every command
      supports --json output and the repo ships a bundled agent skill.
